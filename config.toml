# Elite Dangerous Expedition Tracker — "6 Compass Points"
# Edit paths to match your machine, then launch tracker.pyw.

# ── Journal source ─────────────────────────────────────────────────────────────
# Default is the standard ED Saved Games location on Windows.
journal_dir = 'C:\Users\jenni\Saved Games\Frontier Developments\Elite Dangerous'

# ── Output & database ──────────────────────────────────────────────────────────
# Paths relative to the script root, or use absolute paths.
output_dir = "output"
db_path    = "tracker.db"

# ── Commander ──────────────────────────────────────────────────────────────────
commander = "AristonX"

# ── Expedition anchor ──────────────────────────────────────────────────────────
# The authoritative departure event.  Every journal event with an earlier
# timestamp is silently discarded — this excludes the 1–2 June shakedown loop
# (~21 short hops around the home boxel) AND any pre-expedition activity.
expedition_start_timestamp = "2026-06-03T00:39:41Z"

# Documentation only — NOT used for auto-detection logic.
expedition_start_system = "Dryaa Phoe HI-Z d1-0"

# Arriving here (case-insensitive) closes the final leg and marks the run done.
expedition_end_system = "Parrot's Head Sector EL-Y d70"

# ── Compass-point waypoints ────────────────────────────────────────────────────
# Order does NOT matter — waypoints are visited in any sequence.
# Arriving at an unvisited waypoint auto-closes the current leg and names it.
# System strings are matched case-insensitively against FSDJump.StarSystem.
# Confirm the "East" string against the in-game galaxy map before the run.

[[waypoints]]
label  = "Nadir"
system = "HD 6428"

[[waypoints]]
label  = "Zenith"
system = "HIP 58832"

[[waypoints]]
label  = "West"
system = "Sphiesi HX-L d7-0"

[[waypoints]]
label  = "East"
system = "Ood Fleau ZJ-I d9-0"   # confirmed 2026-06-17

[[waypoints]]
label  = "South"
system = "Lyed YJ-I d9-0"

[[waypoints]]
label  = "North"
system = "Oevasy SG-Y d0"

# ── Rare / notable first-discovery detector ────────────────────────────────────
[rarity]
# If true (default), only evaluate bodies where WasDiscovered == false.
# Set to false to evaluate all scanned bodies (flags still record the values).
flag_only_first_discoveries = true

# Per-rule enable/disable switches
rule_ringed_habitable  = true   # ELW / WW / AW with rings
rule_habitable_moon    = true   # ELW / WW / AW orbiting a planet
rule_life_bearing_gg   = true   # gas giants with water/ammonia life
rule_very_small        = true   # radius below threshold
rule_tidal_moon        = true   # volcanic moon orbiting a planet
rule_jumponium         = true   # geo≥3 + volcanic + ≥1 jumponium material
rule_exotic_star       = true   # neutron / black-hole / white-dwarf / WR / HerbigAeBe
rule_high_gravity      = true   # landable with surface gravity > threshold
rule_fast_rotator      = true   # rotation period below threshold (non-tidal-locked)
rule_ggg_candidate     = true   # gas-giant GGG heuristic (VERIFY VISUALLY — false positives expected)
rule_nsp_alert         = true   # Notable Stellar Phenomena system alert (UNVALIDATED — no live data yet)

# Thresholds
very_small_radius_m   = 300000  # 300 km in metres
high_gravity_g        = 3.0     # surface gravity in g (journal field is m/s²)
fast_rotator_hours    = 3.0     # rotation period threshold in hours
geo_signal_threshold  = 3       # minimum geological signal count for the jumponium rule

# Jumponium-synthesis material set (case-insensitive match against journal Names)
jumponium_materials = [
    "Carbon", "Vanadium", "Germanium", "Arsenic",
    "Niobium", "Yttrium", "Polonium"
]

# Exotic star types — exact match against journal StarType field.
# White dwarfs (DA, DB, DC, …) and Wolf-Rayet (W, WN, WNC, WC, WO) use the full code.
exotic_star_types = [
    "N", "H",
    "DA", "DAB", "DAO", "DAZ", "DAV",
    "DB", "DBZ", "DBV", "DO", "DOV", "DQ", "DC", "DCV", "DX",
    "W", "WN", "WNC", "WC", "WO", "AeBe"
]

# GGG heuristic: PlanetClass values flagged as potential Green Gas Giant candidates.
# These are common GGG classes observed by the community; the journal has no "green" field
# so this is best-effort only.  Water-based-life / ammonia-based-life GGs are rule 3.
ggg_planet_classes = [
    "Sudarsky class I gas giant",
    "Sudarsky class II gas giant",
    "Sudarsky class III gas giant",
    "Sudarsky class IV gas giant",
    "Sudarsky class V gas giant",
    "Helium-rich gas giant",
    "Helium gas giant"
]

# NSP rule: FSSSignalDiscovered signal types to treat as mundane (not flagged).
# Anything NOT on this list triggers the NSP alert.
# Tune once you see a real NSP entry in the journals.
nsp_mundane_signal_types = [
    "Fleet Carrier",
    "Station",
    "Outpost",
    "Installation",
    "Nav Beacon",
    "Resource Extraction Site",
    "Combat Zone",
    "Combat Zone (Low)",
    "Combat Zone (Medium)",
    "Combat Zone (High)",
    "Unidentified Signal Source",
    "Mission target",
    "Megaship",
    "Notable stellar phenomena"
]
