# Elite Dangerous Expedition Tracker
# Edit this file to define your expedition, then launch tracker.pyw.

# ── Journal source ─────────────────────────────────────────────────────────────
# Default is the standard ED Saved Games location on Windows.
# Change this if your journals are in a non-standard location.
journal_dir = 'C:\Users\YourName\Saved Games\Frontier Developments\Elite Dangerous'

# ── Output & database ──────────────────────────────────────────────────────────
# Paths relative to the script root, or use absolute paths.
output_dir = "output"
db_path    = "tracker.db"

# ── Commander ──────────────────────────────────────────────────────────────────
commander = "YourCommanderName"

# ── Expedition definition ──────────────────────────────────────────────────────
# Set expedition_start_timestamp to the UTC timestamp of your first departure
# jump.  Every journal event before this time is silently ignored — use it to
# exclude pre-expedition shakedown flights or prior sessions in the same
# journal directory.
#
# Find the exact timestamp: open your most recent journal file and look for the
# first FSDJump event after you departed for the expedition.
# Format: "YYYY-MM-DDTHH:MM:SSZ"
expedition_start_timestamp = "2025-01-01T00:00:00Z"

# The system you depart from.  Documentation only — not used for tracking logic.
expedition_start_system = "Sol"

# Arriving at this system (case-insensitive) closes the final leg and marks
# the expedition complete.  Set this to your planned final destination.
expedition_end_system = "Sagittarius A*"

# ── Waypoints ──────────────────────────────────────────────────────────────────
# Define one [[waypoints]] block per destination.  Order does NOT matter —
# waypoints are visited in any sequence.
#
# When you FSD-jump AWAY from an unvisited waypoint system, the tracker
# automatically closes the current leg (naming it after that waypoint's label)
# and opens the next one.  Revisiting a waypoint you've already been to has
# no effect.
#
# System names are matched case-insensitively against FSDJump.StarSystem.
# Confirm the exact in-game system name before adding it here.

[[waypoints]]
label  = "Waypoint 1"
system = "Beagle Point"

[[waypoints]]
label  = "Waypoint 2"
system = "Colonia"

# Add more [[waypoints]] blocks as needed for your expedition route.

# ── Rare / notable first-discovery detector ────────────────────────────────────
[rarity]
# If true (default), only evaluate bodies where WasDiscovered == false.
# Set to false to evaluate all scanned bodies regardless of prior discovery.
flag_only_first_discoveries = true

# Per-rule enable/disable switches
rule_ringed_habitable  = true   # ELW / WW / AW with rings
rule_habitable_moon    = true   # ELW / WW / AW orbiting a planet
rule_life_bearing_gg   = true   # gas giants with water/ammonia life
rule_very_small        = true   # radius below threshold
rule_tidal_moon        = true   # volcanic moon orbiting a planet
rule_jumponium         = true   # geo≥3 + volcanic + ≥1 jumponium material
rule_exotic_star       = true   # neutron / black hole / white dwarf / WR / HerbigAeBe
rule_high_gravity      = true   # landable body with surface gravity > threshold
rule_fast_rotator      = true   # rotation period below threshold (non-tidal-locked)
rule_ggg_candidate     = true   # gas-giant GGG heuristic (verify visually — false positives expected)
rule_nsp_alert         = true   # Notable Stellar Phenomena system alert

# Thresholds
very_small_radius_m   = 300000  # 300 km in metres
high_gravity_g        = 3.0     # surface gravity threshold in g
fast_rotator_hours    = 3.0     # rotation period threshold in hours
geo_signal_threshold  = 3       # minimum geological signal count for the jumponium rule

# Jumponium-synthesis material set (case-insensitive match against journal Names)
jumponium_materials = [
    "Carbon", "Vanadium", "Germanium", "Arsenic",
    "Niobium", "Yttrium", "Polonium"
]

# Exotic star types — exact match against journal StarType field.
exotic_star_types = [
    "N", "H",
    "DA", "DAB", "DAO", "DAZ", "DAV",
    "DB", "DBZ", "DBV", "DO", "DOV", "DQ", "DC", "DCV", "DX",
    "W", "WN", "WNC", "WC", "WO", "AeBe"
]

# GGG heuristic: PlanetClass values flagged as potential Green Gas Giant candidates.
ggg_planet_classes = [
    "Sudarsky class I gas giant",
    "Sudarsky class II gas giant",
    "Sudarsky class III gas giant",
    "Sudarsky class IV gas giant",
    "Sudarsky class V gas giant",
    "Helium-rich gas giant",
    "Helium gas giant"
]

# NSP rule: FSSSignalDiscovered signal types to treat as mundane (not flagged).
# Anything NOT on this list triggers the NSP alert.
nsp_mundane_signal_types = [
    "Fleet Carrier",
    "Station",
    "Outpost",
    "Installation",
    "Nav Beacon",
    "Resource Extraction Site",
    "Combat Zone",
    "Combat Zone (Low)",
    "Combat Zone (Medium)",
    "Combat Zone (High)",
    "Unidentified Signal Source",
    "Mission target",
    "Megaship",
    "Notable stellar phenomena"
]
